services:
  - type: web
    name: tabla-periodica-biblia
    runtime: node
    region: oregon
    plan: free
    rootDir: tabla-periodica-biblia/app
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
    healthCheckPath: /
    autoDeploy: true
